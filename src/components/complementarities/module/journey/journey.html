<template>
    <div class="journey">
        <header class="top">
            <div>
                <h1 class="title">Journey</h1>
                <p class="subtitle">
                    Pick a track, open it, and choose a module. Progress is visible at a glance.
                </p>
            </div>

            <div class="actions">
                <input v-model="query" class="search" type="search" placeholder="Search tracks, modules, outcomes…"
                    aria-label="Search" />

                <div class="filters">
                    <select v-model="categoryFilter" class="select" aria-label="Category filter">
                        <option value="all">All categories</option>
                        <option v-for="category in categories" :key="category.id" :value="category.id">
                            {{ category.title }}
                        </option>
                    </select>

                    <select v-model="statusFilter" class="select" aria-label="Status filter">
                        <option value="all">All statuses</option>
                        <option v-for="status in statuses" :key="status.value" :value="status.value">
                            {{ status.label }}
                        </option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Loading state -->
        <div v-if="loading" class="loading-message">
            Loading journey...
        </div>

        <!-- Error state -->
        <div v-if="error" class="error-message">
            ⚠️ {{ error }}
        </div>

        <!-- Global Progress Block -->
        <div v-if="!loading" class="progressBlock">
            <div class="progressBlockLabel">Progress</div>
            <div class="progressBlockValue">{{ totalProgression.completed }}/{{ totalProgression.total }}</div>
        </div>

        <!-- Content -->
        <section v-if="!loading" class="list">
            <article v-for="track in filteredTracks" :key="track.id" class="trackCard" :class="getTrackStatusClass(track)">
                <button class="trackHeader" @click="toggle(track.id)">
                    <div class="left">
                        <div class="badge" :style="{ background: track.color }">{{ track.title }}</div>
                    </div>
                    <div class="right">
                        <div class="chev" :class="{ open: isOpen(track.id) }">⌄</div>
                    </div>
                </button>

                <div v-show="isOpen(track.id)" class="trackBody">
                    <button v-for="m in filteredModules(track)" :key="m.id" class="module" :class="getModuleStatusClass(m.status)" @click="goToCourse(m)">
                        <div class="moduleTop">
                            <div class="dayNumber">Day {{ m.dayNumber }}</div>
                            <div class="moduleTitleRow">
                                <div class="moduleTitleWrap">
                                    <span class="moduleTitle">{{ m.title }}</span>
                                </div>

                                <span class="status" :class="statusClass(m.status)">
                                    <span class="dot"></span>
                                    {{ statusLabel(m.status) }}
                                </span>
                                
                                <p class="moduleDesc">{{ m.summary }}</p>
                            </div>
                        </div>

                        <div class="moduleBottom">
                            <div class="outcomes">
                                <span class="outcomesLabel">Audience:</span>
                                <span class="outcomesText">{{ m.outcomes.join(" • ") }}</span>
                            </div>

                            <div class="cta">
                                <span>Open course</span>
                                <span class="arrow">→</span>
                            </div>
                        </div>
                    </button>
                </div>
            </article>
        </section>
    </div>
</template>
