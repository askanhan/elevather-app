<template>
    <div class="sm">

        <header class="head">
            <div>
                <h1 class="h1">Stories</h1>
                <p class="sub">
                    Inspiration and real stories from our community. 
                </p>
                <p class="sub">
                    Share your own story and connect with others who relate and support you. A safe, anonymous space to express and find solidarity.
                </p>
            </div>

            <div class="tools" v-if="!isGuest">
                <input v-model="query" class="search" type="search" placeholder="Search stories, people, topics…" />
                
                <button class="filterBtn" :class="{ active: showUserStoriesOnly }" @click="toggleUserStoriesOnly">
                    <span class="filterIcon">👤</span>
                    My Stories
                </button>
            </div>
        </header>

        <section class="section" v-if="!isGuest">

            <!-- Community tabs: Real Stories / Share your story / Pending Stories -->
            <div class="subtabs">
                <button class="subtab" :class="{ on: storiesTab === 'real' }" @click="storiesTab = 'real'">
                    Real Stories
                </button>
                <button class="subtab" :class="{ on: storiesTab === 'share' }" @click="storiesTab = 'share'">
                    Share your story
                </button>
                <button class="subtab" :class="{ on: storiesTab === 'pending' }" @click="storiesTab = 'pending'">
                    Pending Stories
                    <span v-if="pendingStoriesCount > 0" class="badgeCount">{{ pendingStoriesCount }}</span>
                </button>
            </div>

            <!-- Real Stories feed -->
            <div v-if="storiesTab === 'real'" class="realStories">

                <div class="sectionHead">
                    <h2 class="h2">Real Stories</h2>
                    <p class="hint">{{ showUserStoriesOnly ? 'Your stories' : 'Anonymous one-liners from real life. No "likes". Only "I relate" and "Support".' }}</p>
                </div>

                <div class="feed">
                    <article v-for="p in filteredPool" :key="p.id" class="post">
                        <div class="postHead">
                            <div class="anon">
                                <span class="anonDot"></span>
                                <span class="anonTxt">{{ p.author || 'Anonymous' }}</span>
                            </div>
                            <div class="postMeta">
                                <span class="chip">{{ p.track || p.category?.title }}</span>
                                <span class="chip">{{ getStoryContext(p) }}</span>
                                <span class="chip">{{ p.when || p.created_at }}</span>
                                <button v-if="isOwnStory(p)" class="deleteBtn" @click="deleteStory(p.id)" title="Delete story">
                                    🗑️
                                </button>
                            </div>
                        </div>

                        <div class="postBody">
                            <div class="postText">{{ p.content || p.text }}</div>

                            <div v-if="p.tags && p.tags.length" class="tagRow">
                                <span v-for="t in p.tags" :key="t" class="tag">{{ t }}</span>
                            </div>
                        </div>

                        <div class="postActions">
                            <button class="pillBtn" :class="{ on: reacted(p.id, 'relatable') }"
                                @click="toggleReaction(p.id, 'relatable')">
                                <span class="ic">🤝</span>
                                <span>I relate</span>
                                <span class="count">{{ p.reactions_count?.relatable || p.relate || 0 }}</span>
                            </button>

                            <button class="pillBtn" :class="{ on: reacted(p.id, 'support') }"
                                @click="toggleReaction(p.id, 'support')">
                                <span class="ic">💗</span>
                                <span>Support</span>
                                <span class="count">{{ p.reactions_count?.support || p.support || 0 }}</span>
                            </button>
                        </div>
                    </article>
                </div>

                <div class="miniTip">
                    Tip: later we can connect this feed to Power Simulator outcomes (recommend a model + a course).
                </div>
            </div>

            <!-- Share your story -->
            <div v-if="storiesTab === 'share'" class="shareStory">

                <div class="sectionHead">
                    <h2 class="h2">Share your story</h2>
                    <p class="hint">
                        Share brief, real moments from your life. Your story will appear anonymously in the feed for the community to relate to and support.
                    </p>
                </div>

                <div class="shareCard">
                    <div class="anonBanner">
                        <span class="anonShield">🛡️</span>
                        <div class="anonBannerTxt">
                            <div class="anonTitle">Your privacy is protected</div>
                            <div class="anonDesc">All stories are posted anonymously. You can share freely without worry. We create a safe space for real stories.</div>
                        </div>
                    </div>

                    <label class="lbl">Your one-liner</label>
                    <textarea v-model="newStory.text" class="ta" maxlength="220"
                        placeholder="Share a brief moment..."></textarea>

                    <div class="row">
                        <div class="field">
                            <label class="lbl">Track</label>
                            <select v-model="newStory.track" class="select2">
                                <option value="" disabled>Select a track</option>
                                <option v-for="cat in trackOptions" :key="cat.id" :value="cat.name || cat.title">
                                    {{ cat.name || cat.title }}
                                </option>
                            </select>
                        </div>

                        <div class="field">
                            <label class="lbl">Context</label>
                            <select v-model="newStory.context" class="select2">
                                <option value="Work">Work</option>
                                <option value="Family">Family</option>
                                <option value="Community">Community</option>
                                <option value="Self">Self</option>
                            </select>
                        </div>
                    </div>

                    <label class="lbl">Optional tags (up to 3)</label>
                    <div class="chipsPick">
                        <button v-for="tag in tagOptions" :key="tag.id" class="pick" :class="{ on: isTagSelected(tag.id) }"
                            @click="toggleTag(tag)" type="button">
                            {{ tag.name }}
                        </button>
                    </div>

                    <div class="shareBottom">
                        <div class="counter">{{ (newStory.text || '').length }}/220</div>
                        <div class="buttonsGroup">
                            <button class="send" :disabled="!canSend" @click="submitStory">
                                Share anonymously
                            </button>
                            <button class="sendNamed" :disabled="!canSend" @click="submitStoryWithName">
                                Share with my name
                            </button>
                        </div>
                    </div>

                    <div v-if="sent" class="sent">
                        ✅ Your story has been submitted! It's now awaiting moderation and will appear in the Real Stories feed once approved.
                    </div>

                    <div v-if="storySubmitError" class="error">
                        ❌ {{ storySubmitError }}
                    </div>
                </div>
            </div>

            <!-- Pending Stories tab -->
            <div v-if="storiesTab === 'pending'" class="pendingStories">

                <div class="sectionHead">
                    <h2 class="h2">Your Pending Stories</h2>
                    <p class="hint">
                        Stories you've submitted that are awaiting moderation approval. Once approved, they'll appear in the Real Stories feed.
                    </p>
                </div>

                <div v-if="pendingStoriesList.length === 0" class="noPendingStories">
                    <p>You don't have any pending stories.</p>
                    <p class="sub">Your submitted stories will appear here while they await publication.</p>
                </div>

                <div v-else class="feed">
                    <article v-for="p in pendingStoriesList" :key="p.id" class="post pending">
                        <div class="statusBadge">⏳ Pending</div>
                        
                        <div class="postHead">
                            <div class="anon">
                                <span class="anonDot"></span>
                                <span class="anonTxt">{{ p.author || 'Anonymous' }}</span>
                            </div>
                            <div class="postMeta">
                                <span class="chip">{{ p.track || p.category?.title }}</span>
                                <span class="chip">{{ getStoryContext(p) }}</span>
                                <span class="chip">{{ p.when || p.created_at }}</span>
                                <button class="deleteBtn" @click="deleteStory(p.id)" title="Delete story">
                                    🗑️
                                </button>
                            </div>
                        </div>

                        <div class="postBody">
                            <div class="postText">{{ p.content || p.text }}</div>

                            <div v-if="p.tags && p.tags.length" class="tagRow">
                                <span v-for="t in p.tags" :key="t" class="tag">{{ t }}</span>
                            </div>
                        </div>
                    </article>
                </div>
            </div>

        </section>

        <!-- Error Modal Popup -->
        <div v-if="showErrorModal" class="errorModalOverlay" @click="closeErrorModal">
            <div class="errorModalContent" @click.stop>
                <div class="errorModalIcon">✨</div>
                <div class="errorModalMessage">{{ errorModalMessage }}</div>
                <button class="errorModalBtn" @click="closeErrorModal">
                    I Understand
                </button>
            </div>
        </div>

        <!-- Delete Confirmation Modal (integrated in page, not browser dialog) -->
        <div v-if="showDeleteModal" class="modalOverlay">
            <div class="modalContent">
                <div class="modalHeader">
                    <h3>Delete Story</h3>
                </div>
                <div class="modalBody">
                    <p>Are you sure you want to delete this story?</p>
                    <p class="modalWarn">This action cannot be undone.</p>
                </div>
                <div class="modalFooter">
                    <button class="modalCancel" @click="cancelDelete">
                        Cancel
                    </button>
                    <button class="modalDelete" @click="confirmDeleteStory">
                        Delete Story
                    </button>
                </div>
            </div>
        </div>

    </div>
</template>
