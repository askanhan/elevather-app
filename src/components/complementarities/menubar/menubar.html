<div class="header header-demo" v-if="current !== '/' && current !== 'chat' && $store.state.flags.loggedIn">
  <!-- Sol: Back + Logo + Metinler -->
  <div class="header-left">
    <a v-if="backButtonAvailable" @click="goBack()" class="header-icon header-icon-back">
      <i class="fas fa-chevron-left"></i>
    </a>

    <div class="header-brand">
      <img id="logo" :src="'./static/img/elevateher_logo_without_title.png'" alt="Elevather logo" />

      <div class="header-texts">
        <!-- Home sayfası: elevather -->
        <span v-if="!showHeaderTitle" id="logo-text">
          {{altyazi}}
        </span>

        <!-- Diğer sayfalar: dinamik başlık -->
        <span v-if="showHeaderTitle" id="logo-text">
          {{ getHeaderTitle() }}
        </span>

        <!-- Hoş geldin – sadece user varsa -->
        <span id="welcome-message" v-if="$store.state.user">
          We Rise Together!
        </span>
      </div>
    </div>
  </div>

  <!-- Sağ: Aksiyon ikonları -->
  <div class="header-right" v-if="backButtonAvailable">
    <a @click="openFeedback()" class="header-icon" :aria-label="$t('common.feedback')" :title="$t('common.feedback')">
      <el-icon>
        <EditPen />
      </el-icon>
    </a>
  </div>
  <div class="header-right" v-if="!backButtonAvailable && !specialButtonAvailable">

    <a v-if="$store.state.flags.loggedIn && $store.state.guestMode" @click="logoutAsGuest()" class="header-icon header-icon--notif" :aria-label="$t('common.notifications')">
      <!-- FontAwesome 5: -->
      <i class="fas fa-sign-out-alt"></i>
    </a>
    
    <a v-if="$store.state.flags.loggedIn &&  !$store.state.guestMode" @click="goToNotifications()" class="header-icon header-icon--notif" :aria-label="$t('common.notifications')">
      <!-- FontAwesome 5: -->
      <i class="far fa-bell"></i>
      <!-- FontAwesome 6: <i class="fa-regular fa-bell"></i> -->
      <span v-if="numberOfUnviewedNotifications > 0" class="header-badge">
        {{ numberOfUnviewedNotifications }}
      </span>
    </a>

    <!-- <a @click="refresh()" class="header-icon header-icon-3 color-green-dark">
      <i class="fas fa-sync-alt"></i>
    </a> -->
  </div>
</div>
