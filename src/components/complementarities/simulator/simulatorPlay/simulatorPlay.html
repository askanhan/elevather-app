<template>
    <div class="simPlay">
        <!-- Error message -->
        <div v-if="error" class="error-message">
            ⚠️ {{ error }}
        </div>

        <!-- Loading message -->
        <div v-if="loading" class="loading-message">
            Loading simulator...
        </div>

        <!-- Content -->
        <template v-if="!loading && !error">
        <header class="topbar">
            <button class="back" @click="goBack">←</button>

            <button class="ghost" @click="restart">Restart</button>
        </header>

        <section class="meters">
            <div class="meter" v-for="m in meterKeys" :key="m">
                <div class="meterTop">
                    <span class="meterName">{{ m }}</span>
                    <span class="meterVal">{{ meters[m] }}/100</span>
                </div>
                <div class="bar">
                    <div class="fill" :style="{ width: meters[m] + '%' }"></div>
                </div>
            </div>
        </section>

        <section class="stage">
            <div class="card">
                <div class="card-header-wrapper">
                    <h2 class="kicker">{{ current.title }}</h2>
                    <audio-button 
                        v-if="current"
                        :owner-type="'card'" 
                        :owner-id="current.cardId" 
                        class="card-audio-button">
                    </audio-button>
                </div>
                <div v-if="current.kicker" class="h2">{{ current.kicker }}</div>
                <p class="p">{{ current.text }}</p>

                <!-- Render card components -->
                <div v-for="comp in current.components" :key="comp.order" class="component">
                    <!-- Text -->
                    <div v-if="comp.type === 'text'" class="comp-text">{{ comp.content }}</div>

                    <!-- Image -->
                    <div v-if="comp.type === 'image'" class="media">
                        <img :src="comp.url" :alt="comp.alt || 'Image'" />
                    </div>

                    <!-- Video -->
                    <div v-if="comp.type === 'video'" class="media">
                        <div class="ph">🎬 {{ comp.url }}</div>
                    </div>

                    <!-- MCQ as options -->
                    <div v-if="comp.type === 'mcq'" class="comp-mcq">
                        <div class="mcq-question">{{ comp.question || 'Select an option:' }}</div>
                        <button v-for="opt in comp.options" :key="opt.id" class="option"
                            :class="{ selected: selectedAnswers[current.id] == opt.id }"
                            @click="choose(opt, comp)">
                            <span class="radio" :class="{ on: selectedAnswers[current.id] == opt.id }"></span>
                            <span class="optText">{{ opt.text }}</span>
                            <span v-if="selectedAnswers[current.id] == opt.id" style="font-size: 0.85em; color: #999; margin-left: 8px;">(ID: {{ opt.id }})</span>
                        </button>
                        <!-- DEBUG: Show selected option ID -->
                        <div v-if="selectedAnswers[current.id]" style="margin-top: 12px; padding: 8px; background: #f0f0f0; border-radius: 6px; font-size: 12px; color: #666;">
                            ✓ Selected Option ID: <strong style="color: #000;">{{ selectedAnswers[current.id] }}</strong>
                        </div>
                    </div>

                    <!-- Quote -->
                    <div v-if="comp.type === 'quote'" class="comp-quote">
                        <div class="quote-text">"{{ comp.content }}"</div>
                        <div class="quote-author">— {{ comp.author }}</div>
                    </div>
                </div>

                <div v-if="current.why" class="reveal">
                    <div class="revealTitle">Why it matters</div>
                    <p class="p">{{ current.why }}</p>
                </div>

                <div v-if="feedback" class="reveal">
                    <div class="revealTitle">Feedback</div>
                    <p class="p">{{ feedback }}</p>
                </div>

                <details v-if="current.lens" class="lens">
                    <summary>Power lens</summary>
                    <div class="whyBody">{{ current.lens }}</div>
                </details>
            </div>


        </section>

        <!-- Debrief Section -->
        <section class="debrief debriefSection" v-if="showDebrief && debriefData">
            <div class="card">
                <h2 class="h2">📊 Your Feedback</h2>
                <p class="p">Here's how you performed on each metric:</p>

                <!-- Feedbacks list -->
                <div class="feedbacksList">
                    <div v-for="feedback in debriefData" :key="feedback.metric_name" class="feedbackItem">
                        <div class="feedbackHeader">
                            <h3 class="feedbackTitle">{{ feedback.metric_name }}</h3>
                            <span class="feedbackScore">{{ feedback.score }}%</span>
                        </div>
                        
                        <div v-if="feedback.strength" class="feedbackBox strengthBox">
                            <span class="feedbackIcon">💪</span>
                            <div>
                                <div class="feedbackLabel">Strength</div>
                                <p class="feedbackText">{{ feedback.strength }}</p>
                            </div>
                        </div>

                        <div v-if="feedback.risk" class="feedbackBox riskBox">
                            <span class="feedbackIcon">⚠️</span>
                            <div>
                                <div class="feedbackLabel">Area to develop</div>
                                <p class="feedbackText">{{ feedback.risk }}</p>
                            </div>
                        </div>

                        <div v-if="feedback.practice" class="feedbackBox practiceBox">
                            <span class="feedbackIcon">🎯</span>
                            <div>
                                <div class="feedbackLabel">Micro-practice</div>
                                <p class="feedbackText">{{ feedback.practice }}</p>
                            </div>
                        </div>

                        <div v-if="feedback.recommendation && feedback.recommendation.reason" class="feedbackBox recommendationBox">
                            <span class="feedbackIcon">📚</span>
                            <div>
                                <div class="feedbackLabel">Recommended module</div>
                                <p class="feedbackText">{{ feedback.recommendation.reason }}</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Bottom navigation with dots -->
        <div class="nav">
            <button class="navBtn" :disabled="stepIndex === 0 || showDebrief" @click="prev">
                Prev
            </button>

            <div class="dots">
                <span v-for="(s, idx) in steps" :key="s.id" class="dot"
                    :class="{ active: idx === stepIndex }" @click="goTo(idx)"></span>
            </div>

            <!-- Finish button (debrief page) -->
            <button v-if="showDebrief" class="navBtn primary" @click="finishAndNavigate">
                Finish →
            </button>

            <!-- Next/Show result button -->
            <button v-else class="navBtn primary" 
                :disabled="(stepIndex === steps.length - 1 ? debriefLoading : (needsChoice && !feedback))" 
                @click="stepIndex === steps.length - 1 ? showResultsDebrief() : next()">
                {{ stepIndex === steps.length - 1 ? 'Show result' : 'Next' }}
            </button>
        </div>
        </template>
    </div>
</template>
